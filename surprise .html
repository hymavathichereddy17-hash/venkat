<!DOCTYPE html>
<html>

<head>
    <title>Surprise 🎉</title>
    <style>
        body {
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            color: white;
            font-family: Arial;
            padding-top: 100px;
        }

        h1 {
            font-size: 40px;
            animation: glow 1s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px white;
            }

            to {
                text-shadow: 0 0 20px yellow;
            }
        }
    </style>
</head>

<body>
    <h1>💖 Happy Special Day 💖</h1>
    <p>You are amazing and this is just for you ✨</p>
</body>

</html>
